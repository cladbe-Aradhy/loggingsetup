apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: otel-gateway
  labels:
    app.kubernetes.io/name: otel-gateway
    app.kubernetes.io/part-of: observability
spec:
  serviceName: otel-gateway-headless
  replicas: 3
  minReadySeconds: 10
  podManagementPolicy: Parallel
  updateStrategy:
    type: RollingUpdate
  persistentVolumeClaimRetentionPolicy:
    whenDeleted: Retain
    whenScaled: Retain
  selector:
    matchLabels:
      app.kubernetes.io/name: otel-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: otel-gateway
        app.kubernetes.io/part-of: observability
    spec:
      automountServiceAccountToken: true
      enableServiceLinks: false
      serviceAccountName: otel-gateway
      priorityClassName: otel-gateway-high
      terminationGracePeriodSeconds: 120
      securityContext:
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: otel-gateway
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: otel-gateway
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app.kubernetes.io/name: otel-gateway
              topologyKey: kubernetes.io/hostname
      containers:
        - name: otel-gateway
          image: otel/opentelemetry-collector-contrib:0.118.0
          imagePullPolicy: IfNotPresent
          terminationMessagePolicy: FallbackToLogsOnError
          args:
            - --config=/conf/$(GATEWAY_COLLECTOR_CONFIG)
          envFrom:
            - configMapRef:
                name: otel-gateway-env
            - secretRef:
                name: otel-gateway-exporter
          ports:
            - name: otlp-grpc
              containerPort: 4317
            - name: otlp-http
              containerPort: 4318
            - name: health
              containerPort: 13133
            - name: metrics
              containerPort: 8888
          livenessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: health
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /
              port: health
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 24
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - sleep 20
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: collector-config
              mountPath: /conf
              readOnly: true
            - name: backend-ingest-auth
              mountPath: /var/run/secrets/otel-gateway/backend-auth
              readOnly: true
            - name: frontend-ingest-auth
              mountPath: /var/run/secrets/otel-gateway/frontend-auth
              readOnly: true
            - name: otel-gateway-data
              mountPath: /var/lib/otelcol
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: collector-config
          configMap:
            name: otel-gateway-config
        - name: backend-ingest-auth
          secret:
            secretName: otel-gateway-backend-ingest-auth
        - name: frontend-ingest-auth
          secret:
            secretName: otel-gateway-frontend-ingest-auth
        - name: tmp
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: otel-gateway-data
        labels:
          app.kubernetes.io/name: otel-gateway
          app.kubernetes.io/part-of: observability
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi
